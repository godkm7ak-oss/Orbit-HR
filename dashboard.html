<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าหลัก — Orbit HR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header" id="page-header"></header>
    <main class="page-content" id="main"></main>
  </div>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast-container" id="toast-container"></div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
const user = initPage('dashboard', 'หน้าหลัก');
if (user) render();

function render() {
  const company    = Auth.currentCompany();
  const isManager  = Auth.canApproveLeave(user);
  const today      = DB.today();
  const month      = today.slice(0,7);

  const allUsers   = DB.Users.getByCompany(user.companyId).filter(u => u.status === 'active');
  const employees  = allUsers.filter(u => u.role !== 'admin');
  const todayAtt   = DB.Attendance.getByCompany(user.companyId, { date: today });
  const monthAtt   = DB.Attendance.getByCompany(user.companyId, { month });
  const pending    = DB.Leaves.getByCompany(user.companyId, { status: 'pending' });

  const myTodayAtt  = DB.Attendance.getTodayByUser(user.id);
  const myLeaves    = DB.Leaves.getByUser(user.id);
  const myBalance   = DB.Leaves.getBalance(user.id);
  const myMeetings  = DB.Meetings.getForUser(user.id).filter(m => m.date >= today).slice(0, 3);
  const mySchedules = DB.Schedules.getUserWeek(user.id, DB.getMonday(today));
  const shifts      = DB.Shifts.getByCompany(user.companyId);
  const shiftMap    = Object.fromEntries(shifts.map(s => [s.id, s]));

  const todaySchedule = mySchedules.find(s => s.date === today);
  const todayShift    = todaySchedule ? shiftMap[todaySchedule.shiftId] : null;

  const checkedInCount = todayAtt.length;
  const lateCount      = todayAtt.filter(a => a.status === 'late').length;
  const firstName      = user.name.split(' ')[0];

  const main = document.getElementById('main');
  main.innerHTML = `
    <!-- ── Greeting ── -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s7);gap:var(--s4);flex-wrap:wrap">
      <div>
        <h2 style="font-size:22px;font-weight:750;letter-spacing:-0.025em;color:var(--text-primary)">
          สวัสดี, ${firstName} 👋
        </h2>
        <p style="font-size:13px;color:var(--text-muted);margin-top:3px">
          ${formatDate(today)} · ${company?.name || 'Orbit HR'}
        </p>
      </div>
      <div class="btn-group">
        ${myTodayAtt
          ? `<span class="badge badge-success" style="height:32px;padding:0 14px;font-size:13px;gap:6px">
               ${iconSVG('check','13')} เช็คอินแล้ว ${myTodayAtt.checkIn} น.
             </span>`
          : `<a href="checkin.html" class="btn btn-primary">
               ${iconSVG('map-pin','14')} เช็คอินตอนนี้
             </a>`}
        <a href="leave.html" class="btn btn-secondary">
          ${iconSVG('calendar','14')} ขอลา
        </a>
      </div>
    </div>

    <!-- ── Manager KPI Cards ── -->
    ${isManager ? renderManagerKPI(checkedInCount, employees.length, lateCount, pending.length, monthAtt, allUsers) : ''}

    <!-- ── Quick Actions ── -->
    <div style="margin-bottom:var(--s7)">
      <div class="section-header" style="margin-bottom:var(--s4)">
        <span class="section-title">การดำเนินการด่วน</span>
      </div>
      <div class="grid grid-4">
        <a href="checkin.html" class="quick-action">
          <div class="quick-action-icon" style="background:var(--primary-light);color:var(--primary)">${iconSVG('map-pin','20')}</div>
          <span class="quick-action-label">เช็คอิน / เช็คเอาท์</span>
        </a>
        <a href="leave.html" class="quick-action">
          <div class="quick-action-icon" style="background:var(--success-bg);color:var(--success)">${iconSVG('calendar','20')}</div>
          <span class="quick-action-label">ขอลาหยุด</span>
        </a>
        <a href="schedule.html" class="quick-action">
          <div class="quick-action-icon" style="background:var(--info-bg);color:var(--info)">${iconSVG('clock','20')}</div>
          <span class="quick-action-label">ตารางงาน</span>
        </a>
        ${isManager
          ? `<a href="reports.html" class="quick-action">
               <div class="quick-action-icon" style="background:var(--warning-bg);color:var(--warning)">${iconSVG('bar-chart','20')}</div>
               <span class="quick-action-label">รายงาน</span>
             </a>`
          : `<a href="meetings.html" class="quick-action">
               <div class="quick-action-icon" style="background:#F5F0FF;color:#8B5CF6">${iconSVG('video','20')}</div>
               <span class="quick-action-label">ประชุม & ประกาศ</span>
             </a>`}
      </div>
    </div>

    <!-- ── Main Grid ── -->
    <div class="grid grid-2" style="margin-bottom:var(--s6)">
      ${renderCheckinCard(myTodayAtt, todayShift)}
      ${renderWeekCard(mySchedules, shiftMap, today)}
    </div>

    <!-- ── Leave Balance ── -->
    <div class="card" style="margin-bottom:var(--s6)">
      <div class="card-header">
        <span class="card-title">วันลาคงเหลือปีนี้</span>
        <a href="leave.html" class="btn btn-ghost btn-sm">ดูทั้งหมด →</a>
      </div>
      <div class="card-body">
        <div class="grid grid-4" id="balance-grid">
          ${renderBalanceCards(myBalance)}
        </div>
      </div>
    </div>

    <!-- ── Bottom Row ── -->
    <div class="grid grid-2" style="margin-bottom:var(--s6)">
      ${renderMeetingsCard(myMeetings)}
      ${isManager ? renderPendingLeavesCard(pending) : renderRecentLeavesCard(myLeaves)}
    </div>

    <!-- ── Attendance Chart (manager only) ── -->
    ${isManager ? `
    <div class="card">
      <div class="card-header">
        <span class="card-title">การเข้างาน 7 วันล่าสุด</span>
        <a href="reports.html" class="btn btn-ghost btn-sm">รายงานเต็ม →</a>
      </div>
      <div class="card-body">
        <canvas id="attChart" height="80"></canvas>
      </div>
    </div>` : ''}
  `;

  if (isManager) renderChart();
}

/* ── Manager KPI Cards ─────────────────────────── */
function renderManagerKPI(checkedIn, total, late, pendingCount, monthAtt, allUsers) {
  const attendRate = pct(checkedIn, total);
  const prevCheckedIn = Math.max(0, checkedIn + Math.floor(Math.random() * 3) - 1);
  const trendDir = checkedIn >= prevCheckedIn ? 'up' : 'down';

  const cards = [
    {
      label: 'เช็คอินแล้ววันนี้',
      value: `${checkedIn}<span style="font-size:18px;color:var(--text-muted);font-weight:500">/${total}</span>`,
      icon: 'users',
      iconBg: 'var(--primary-light)', iconColor: 'var(--primary)',
      trend: `<span class="stat-trend ${trendDir}">
        ${iconSVG(trendDir === 'up' ? 'trending-up' : 'trending-down', '12')}
        ${attendRate}%
      </span>`,
    },
    {
      label: 'เข้างานสายวันนี้',
      value: `<span style="color:${late > 0 ? 'var(--warning)' : 'var(--text-primary)'}">${late}</span>`,
      icon: 'clock',
      iconBg: 'var(--warning-bg)', iconColor: 'var(--warning)',
      trend: late > 0
        ? `<span class="stat-trend down">${iconSVG('arrow-up','12')} ${late} คน</span>`
        : `<span class="stat-trend up">${iconSVG('check','12')} ตรงเวลา</span>`,
    },
    {
      label: 'รอการอนุมัติลา',
      value: `<span style="color:${pendingCount > 0 ? 'var(--danger)' : 'var(--text-primary)'}">${pendingCount}</span>`,
      icon: 'calendar',
      iconBg: 'var(--danger-bg)', iconColor: 'var(--danger)',
      trend: pendingCount > 0
        ? `<span class="stat-trend down">${iconSVG('alert','12')} ต้องตรวจสอบ</span>`
        : `<span class="stat-trend neutral">ไม่มีรายการ</span>`,
    },
    {
      label: 'พนักงานทั้งหมด',
      value: total,
      icon: 'briefcase',
      iconBg: '#F5F0FF', iconColor: '#8B5CF6',
      trend: `<span class="stat-trend neutral">${iconSVG('users','12')} ${total} คน</span>`,
    },
  ];

  return `
    <div class="grid grid-4" style="margin-bottom:var(--s7)">
      ${cards.map(c => `
        <div class="stat-card">
          <div class="stat-card-top">
            <div>
              <div class="stat-label" style="margin-bottom:var(--s2)">${c.label}</div>
              <div class="stat-value">${c.value}</div>
            </div>
            <div class="stat-icon" style="background:${c.iconBg};color:${c.iconColor}">
              ${iconSVG(c.icon, '18')}
            </div>
          </div>
          <div style="margin-top:var(--s3)">${c.trend}</div>
        </div>
      `).join('')}
    </div>`;
}

/* ── Check-in Status Card ───────────────────────── */
function renderCheckinCard(rec, shift) {
  const now     = new Date();
  const timeStr = now.toTimeString().slice(0, 5);

  if (rec) {
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-title">สถานะวันนี้</span>
          ${!rec.checkOut
            ? `<a href="checkin.html" class="btn btn-secondary btn-sm">${iconSVG('map-pin','13')} เช็คเอาท์</a>`
            : `<span class="badge badge-neutral">เสร็จงานแล้ว</span>`}
        </div>
        <div class="card-body" style="text-align:center;padding:var(--s8) var(--s6)">
          <div style="width:64px;height:64px;border-radius:50%;background:var(--success-bg);color:var(--success);display:flex;align-items:center;justify-content:center;margin:0 auto var(--s4)">
            ${iconSVG('check','28')}
          </div>
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:var(--s2)">เช็คอินเวลา</div>
          <div style="font-size:36px;font-weight:750;letter-spacing:-0.03em;color:var(--success);line-height:1;font-variant-numeric:tabular-nums">
            ${rec.checkIn} <span style="font-size:16px;font-weight:500;color:var(--text-muted)">น.</span>
          </div>
          <div style="margin-top:var(--s4)">
            ${rec.lateMinutes > 0
              ? `<span class="badge badge-warning">${iconSVG('clock','12')} สาย ${rec.lateMinutes} นาที</span>`
              : `<span class="badge badge-success">${iconSVG('check','12')} ตรงเวลา</span>`}
          </div>
          ${rec.checkOut
            ? `<div style="font-size:12px;color:var(--text-muted);margin-top:var(--s4)">เช็คเอาท์ ${rec.checkOut} น.</div>`
            : ''}
        </div>
      </div>`;
  }

  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">สถานะวันนี้</span>
        ${shift ? `<span class="badge badge-primary">${iconSVG('clock','12')} ${shift.name}</span>` : ''}
      </div>
      <div class="card-body" style="text-align:center;padding:var(--s8) var(--s6)">
        <div style="font-size:48px;font-weight:800;letter-spacing:-0.04em;color:var(--text-primary);line-height:1;font-variant-numeric:tabular-nums" id="live-clock">
          ${timeStr}
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin:var(--s3) 0 var(--s6)">${formatDate(DB.today())}</div>
        ${shift
          ? `<div style="margin-bottom:var(--s5);font-size:13px;color:var(--text-secondary)">กะ: <strong>${shift.startTime}–${shift.endTime} น.</strong></div>`
          : ''}
        <a href="checkin.html" class="btn btn-primary" style="width:100%;justify-content:center;height:42px;font-size:14px">
          ${iconSVG('map-pin','16')} เช็คอินตอนนี้
        </a>
      </div>
    </div>`;
}

/* ── Weekly Schedule Card ───────────────────────── */
function renderWeekCard(schedules, shiftMap, today) {
  const days  = ['จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส', 'อา'];
  const monday = DB.getMonday(today);
  const todaySchedule = schedules.find(s => s.date === today);
  const todayShift    = todaySchedule ? shiftMap[todaySchedule.shiftId] : null;

  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">ตารางสัปดาห์นี้</span>
        <a href="schedule.html" class="btn btn-ghost btn-sm">ดูทั้งหมด →</a>
      </div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:var(--s5)">
          ${Array.from({ length: 7 }, (_, i) => {
            const d   = DB.addDays(monday, i);
            const sch = schedules.find(s => s.date === d);
            const sh  = sch ? shiftMap[sch.shiftId] : null;
            const isToday = d === today;
            return `
              <div style="text-align:center;padding:8px 2px;border-radius:10px;background:${isToday ? 'var(--primary-light)' : 'transparent'}">
                <div style="font-size:10px;font-weight:600;color:${isToday ? 'var(--primary)' : 'var(--text-muted)'};margin-bottom:5px">${days[i]}</div>
                <div style="width:8px;height:8px;border-radius:50%;background:${sh ? sh.color : 'var(--border)'};margin:0 auto 3px"></div>
                <div style="font-size:9px;color:var(--text-muted)">${sh ? sh.name.slice(0, 2) : ''}</div>
              </div>`;
          }).join('')}
        </div>
        ${todayShift
          ? `<div style="padding:12px;background:var(--primary-light);border-radius:var(--r-sm);display:flex;align-items:center;gap:10px">
               <div style="width:10px;height:10px;border-radius:50%;background:${todayShift.color};flex-shrink:0"></div>
               <div>
                 <div style="font-size:13px;font-weight:650;color:var(--primary)">${todayShift.name}</div>
                 <div style="font-size:12px;color:var(--text-secondary)">${todayShift.startTime} – ${todayShift.endTime} น.</div>
               </div>
             </div>`
          : `<div style="text-align:center;padding:var(--s4);font-size:13px;color:var(--text-muted)">ไม่มีกะงานวันนี้</div>`}
      </div>
    </div>`;
}

/* ── Leave Balance Cards ────────────────────────── */
function renderBalanceCards(balance) {
  const types = Object.values(balance);
  if (!types.length) {
    return `<div class="empty-state" style="padding:var(--s6);grid-column:1/-1">
      <p>ยังไม่มีประเภทการลา</p>
    </div>`;
  }
  return types.map(({ type, remaining, total, used }) => `
    <div style="padding:var(--s3) 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s2)">
        <span style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600">
          <span style="width:8px;height:8px;border-radius:50%;background:${type.color};display:inline-block"></span>
          ${type.name}
        </span>
        <span style="font-size:20px;font-weight:750;color:${remaining <= 2 ? 'var(--danger)' : remaining <= 5 ? 'var(--warning)' : 'var(--primary)'}">
          ${remaining}
        </span>
      </div>
      <div style="font-size:11.5px;color:var(--text-muted);margin-bottom:var(--s2)">ใช้ไป ${used} / ทั้งหมด ${total} วัน</div>
      <div class="leave-bar-wrap">
        <div class="leave-bar-fill" style="width:${pct(used, total)}%;background:${remaining <= 2 ? 'var(--danger)' : remaining <= 5 ? 'var(--warning)' : type.color}"></div>
      </div>
    </div>
  `).join('');
}

/* ── Meetings Card ──────────────────────────────── */
function renderMeetingsCard(meetings) {
  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">ประชุมที่กำลังจะมาถึง</span>
        <a href="meetings.html" class="btn btn-ghost btn-sm">ดูทั้งหมด →</a>
      </div>
      <div class="card-body p-0">
        ${meetings.length === 0
          ? `<div class="empty-state" style="padding:var(--s8)">
               <div class="empty-icon">${iconSVG('video','22')}</div>
               <p>ไม่มีประชุมที่กำลังจะมาถึง</p>
             </div>`
          : `<div class="activity-list" style="padding:0 var(--s6)">
              ${meetings.map(m => `
                <div class="activity-item">
                  <div style="width:42px;height:42px;background:var(--info-bg);border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
                    <div style="font-size:16px;font-weight:750;color:var(--info);line-height:1">${new Date(m.date).getDate()}</div>
                    <div style="font-size:9px;font-weight:600;color:var(--info);text-transform:uppercase">${new Date(m.date).toLocaleDateString('th-TH',{month:'short'})}</div>
                  </div>
                  <div class="activity-content">
                    <div class="activity-text"><strong>${m.title}</strong></div>
                    <div class="activity-time">${m.startTime} น. · ${m.location || m.meetingLink || '—'}</div>
                  </div>
                </div>
              `).join('')}
             </div>`}
      </div>
    </div>`;
}

/* ── Pending Leaves Card (manager) ─────────────── */
function renderPendingLeavesCard(pending) {
  const users   = DB.Users.getByCompany(user.companyId);
  const types   = DB.LeaveTypes.getByCompany(user.companyId);
  const userMap = Object.fromEntries(users.map(u => [u.id, u]));
  const typeMap = Object.fromEntries(types.map(t => [t.id, t]));

  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">รอการอนุมัติลา
          ${pending.length > 0 ? `<span class="badge badge-warning" style="margin-left:8px">${pending.length}</span>` : ''}
        </span>
        <a href="leave.html" class="btn btn-ghost btn-sm">จัดการ →</a>
      </div>
      <div class="card-body p-0">
        ${pending.length === 0
          ? `<div class="empty-state" style="padding:var(--s8)">
               <div class="empty-icon">${iconSVG('check','22')}</div>
               <p>ไม่มีคำขอรอการอนุมัติ</p>
             </div>`
          : `<div class="activity-list" style="padding:0 var(--s6)">
               ${pending.slice(0, 4).map(l => {
                 const u = userMap[l.userId] || {};
                 const t = typeMap[l.leaveTypeId] || {};
                 return `
                   <div class="activity-item">
                     ${renderAvatar(u, 'sm')}
                     <div class="activity-content">
                       <div class="activity-text"><strong>${u.name || '—'}</strong> · ${t.name || '—'}</div>
                       <div class="activity-time">${l.days} วัน · ${formatDateShort(l.startDate)}</div>
                     </div>
                     <a href="leave.html" class="btn btn-primary btn-sm">${iconSVG('check','12')} อนุมัติ</a>
                   </div>`;
               }).join('')}
             </div>`}
      </div>
    </div>`;
}

/* ── Recent Leaves Card (employee) ─────────────── */
function renderRecentLeavesCard(leaves) {
  const types   = DB.LeaveTypes.getByCompany(user.companyId);
  const typeMap = Object.fromEntries(types.map(t => [t.id, t]));

  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">การลาล่าสุด</span>
        <a href="leave.html" class="btn btn-ghost btn-sm">ดูทั้งหมด →</a>
      </div>
      <div class="card-body p-0">
        ${leaves.length === 0
          ? `<div class="empty-state" style="padding:var(--s8)">
               <div class="empty-icon">${iconSVG('calendar','22')}</div>
               <p>ยังไม่มีประวัติการลา</p>
             </div>`
          : `<div class="activity-list" style="padding:0 var(--s6)">
               ${leaves.slice(0, 4).map(l => {
                 const t = typeMap[l.leaveTypeId] || {};
                 return `
                   <div class="activity-item">
                     <div class="activity-dot" style="background:${t.color || 'var(--border)'}"></div>
                     <div class="activity-content">
                       <div class="activity-text"><strong>${t.name || '—'}</strong> · ${l.days} วัน</div>
                       <div class="activity-time">${formatDateShort(l.startDate)}</div>
                     </div>
                     ${leaveStatusBadge(l.status)}
                   </div>`;
               }).join('')}
             </div>`}
      </div>
    </div>`;
}

/* ── Attendance Chart ───────────────────────────── */
function renderChart() {
  const today   = DB.today();
  const days    = Array.from({ length: 7 }, (_, i) => DB.addDays(today, i - 6));
  const labels  = days.map(d => new Date(d).toLocaleDateString('th-TH', { weekday: 'short' }));
  const total   = DB.Users.getByCompany(user.companyId).filter(u => u.role !== 'admin').length;

  const present = days.map(d => DB.Attendance.getByCompany(user.companyId, { date: d }).length);
  const late    = days.map(d => DB.Attendance.getByCompany(user.companyId, { date: d }).filter(a => a.status === 'late').length);

  const ctx = document.getElementById('attChart');
  if (!ctx) return;

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'เข้างาน', data: present, backgroundColor: '#5B5BD6', borderRadius: 6, borderSkipped: false },
        { label: 'สาย',     data: late,    backgroundColor: '#F59E0B', borderRadius: 6, borderSkipped: false },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { position: 'top', labels: { font: { family: 'Inter', size: 12 } } },
        tooltip: { mode: 'index', intersect: false },
      },
      scales: {
        y: {
          beginAtZero: true,
          max: Math.max(total, 5),
          grid: { color: '#F0F0F5' },
          ticks: { font: { family: 'Inter', size: 11 } },
        },
        x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11 } } },
      },
    },
  });
}

/* ── Live clock ─────────────────────────────────── */
setInterval(() => {
  const el = document.getElementById('live-clock');
  if (el) el.textContent = new Date().toTimeString().slice(0, 5);
}, 1000);
</script>
</body>
</html>
