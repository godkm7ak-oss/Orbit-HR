<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พนักงาน — Orbit HR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header" id="page-header"></header>
    <main class="page-content" id="main"></main>
  </div>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast-container" id="toast-container"></div>

<!-- Modal: Add/Edit Employee -->
<div class="modal-overlay" id="modal-emp">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="emp-modal-title">เพิ่มพนักงาน</span>
      <button class="modal-close" onclick="Modal.close('modal-emp')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">ชื่อ-นามสกุล <span class="required">*</span></label>
          <input type="text" id="e-name" class="form-control" placeholder="ชื่อเต็ม">
        </div>
        <div class="form-group">
          <label class="form-label">อีเมล (สำหรับ Admin/HR)</label>
          <input type="email" id="e-email" class="form-control" placeholder="email@company.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">แผนก</label>
          <input type="text" id="e-dept" class="form-control" placeholder="เช่น แผนกต้อนรับ">
        </div>
        <div class="form-group">
          <label class="form-label">ตำแหน่ง</label>
          <input type="text" id="e-position" class="form-control" placeholder="เช่น พนักงานต้อนรับ">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">สิทธิ์ในระบบ</label>
          <select id="e-role" class="form-select">
            <option value="employee">Employee — พนักงาน</option>
            <option value="manager">Manager — ผู้จัดการ</option>
            <option value="hr">HR — ฝ่ายบุคคล</option>
            <option value="admin">Admin — ผู้ดูแล</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">วันที่เริ่มงาน</label>
          <input type="date" id="e-start" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">เบอร์โทรศัพท์</label>
        <input type="tel" id="e-phone" class="form-control" placeholder="08x-xxx-xxxx">
      </div>
      <div id="e-password-group" class="form-group">
        <label class="form-label">รหัสผ่าน <span style="color:var(--text-muted);font-weight:400">(สำหรับ Admin/HR เท่านั้น)</span></label>
        <input type="password" id="e-password" class="form-control" placeholder="ตั้งรหัสผ่าน">
        <div class="form-hint">พนักงานทั่วไปใช้รหัสพนักงาน (EMP001) แทนรหัสผ่าน</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-emp')">ยกเลิก</button>
      <button class="btn btn-primary" id="emp-save-btn" onclick="saveEmployee()">เพิ่มพนักงาน</button>
    </div>
  </div>
</div>

<!-- Modal: Employee Detail -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title">ข้อมูลพนักงาน</span>
      <button class="modal-close" onclick="Modal.close('modal-detail')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
const user = initPage('employees', 'จัดการพนักงาน', `<button class="btn btn-primary" onclick="openAdd()">${iconSVG('plus','15')} เพิ่มพนักงาน</button>`);
let editingId = null;
if (user) render();

function render() {
  const employees = DB.Users.getByCompany(user.companyId).filter(u=>u.status==='active');
  const depts = [...new Set(employees.map(e=>e.department).filter(Boolean))];
  const main = document.getElementById('main');

  main.innerHTML = `
    <!-- Stats -->
    <div class="grid grid-4" style="margin-bottom:20px">
      <div class="stat-card">
        <div class="stat-icon" style="background:#EEF2FF;color:#4F46E5">${iconSVG('users','18')}</div>
        <div class="stat-value">${employees.length}</div>
        <div class="stat-label">พนักงานทั้งหมด</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#ECFDF5;color:#10B981">${iconSVG('briefcase','18')}</div>
        <div class="stat-value">${depts.length}</div>
        <div class="stat-label">แผนก</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#FFFBEB;color:#F59E0B">${iconSVG('user','18')}</div>
        <div class="stat-value">${employees.filter(e=>['admin','hr'].includes(e.role)).length}</div>
        <div class="stat-label">Admin / HR</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#F0F9FF;color:#0EA5E9">${iconSVG('calendar','18')}</div>
        <div class="stat-value">${employees.filter(e=>{const d=new Date(e.startDate||e.createdAt);return d.getFullYear()===new Date().getFullYear();}).length}</div>
        <div class="stat-label">เข้างานปีนี้</div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">รายชื่อพนักงาน</span>
        <div class="filter-bar">
          <div class="search-input">
            ${iconSVG('search','14')}
            <input type="text" placeholder="ค้นหาชื่อหรือรหัส..." id="search-emp" oninput="filterTable()">
          </div>
          <select class="form-select" style="width:auto" id="filter-dept" onchange="filterTable()">
            <option value="">ทุกแผนก</option>
            ${depts.map(d=>`<option value="${d}">${d}</option>`).join('')}
          </select>
          <select class="form-select" style="width:auto" id="filter-role" onchange="filterTable()">
            <option value="">ทุกสิทธิ์</option>
            <option value="admin">Admin</option>
            <option value="hr">HR</option>
            <option value="manager">Manager</option>
            <option value="employee">Employee</option>
          </select>
        </div>
      </div>
      <div class="table-wrap" style="border:none;border-radius:0">
        <table>
          <thead><tr>
            <th>พนักงาน</th>
            <th>รหัสพนักงาน</th>
            <th>แผนก / ตำแหน่ง</th>
            <th>สิทธิ์</th>
            <th>วันที่เริ่มงาน</th>
            <th></th>
          </tr></thead>
          <tbody id="emp-table-body"></tbody>
        </table>
      </div>
    </div>
  `;
  filterTable();
}

function filterTable() {
  const search = (document.getElementById('search-emp')?.value||'').toLowerCase();
  const dept   = document.getElementById('filter-dept')?.value||'';
  const role   = document.getElementById('filter-role')?.value||'';
  let employees = DB.Users.getByCompany(user.companyId).filter(u=>u.status==='active');
  if (search) employees = employees.filter(e=>(e.name||'').toLowerCase().includes(search)||(e.employeeCode||'').toLowerCase().includes(search)||(e.email||'').toLowerCase().includes(search));
  if (dept)   employees = employees.filter(e=>e.department===dept);
  if (role)   employees = employees.filter(e=>e.role===role);
  const body = document.getElementById('emp-table-body');
  if (!body) return;
  if (!employees.length) { body.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">ไม่พบพนักงาน</td></tr>`; return; }
  body.innerHTML = employees.map(e=>`
    <tr>
      <td><div class="table-user">${renderAvatar(e,'md')}<div><div class="user-name">${e.name}</div><div class="user-sub">${e.email||'—'}</div></div></div></td>
      <td><span class="badge badge-neutral" style="font-family:monospace;letter-spacing:1px">${e.employeeCode||'Admin'}</span></td>
      <td><div style="font-size:13px;font-weight:500">${e.department||'—'}</div><div style="font-size:12px;color:var(--text-muted)">${e.position||'—'}</div></td>
      <td><span class="badge ${e.role==='admin'?'badge-primary':e.role==='hr'?'badge-info':e.role==='manager'?'badge-warning':'badge-neutral'}">${roleLabel(e.role)}</span></td>
      <td style="color:var(--text-muted)">${e.startDate?formatDateShort(e.startDate):'—'}</td>
      <td>
        <div class="btn-group">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="viewEmployee('${e.id}')" title="ดูรายละเอียด">${iconSVG('user','14')}</button>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="editEmployee('${e.id}')" title="แก้ไข">${iconSVG('edit','14')}</button>
          ${e.id!==user.id?`<button class="btn btn-ghost btn-sm btn-icon" onclick="removeEmployee('${e.id}')" title="ลบ" style="color:var(--danger)">${iconSVG('trash','14')}</button>`:''}
        </div>
      </td>
    </tr>`).join('');
}

function openAdd() {
  editingId = null;
  document.getElementById('emp-modal-title').textContent = 'เพิ่มพนักงาน';
  document.getElementById('emp-save-btn').textContent = 'เพิ่มพนักงาน';
  ['e-name','e-email','e-dept','e-position','e-phone','e-password'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('e-role').value = 'employee';
  document.getElementById('e-start').value = DB.today();
  Modal.open('modal-emp');
}

function editEmployee(id) {
  editingId = id;
  const emp = DB.Users.get(id);
  if (!emp) return;
  document.getElementById('emp-modal-title').textContent = 'แก้ไขข้อมูลพนักงาน';
  document.getElementById('emp-save-btn').textContent = 'บันทึกการแก้ไข';
  document.getElementById('e-name').value     = emp.name||'';
  document.getElementById('e-email').value    = emp.email||'';
  document.getElementById('e-dept').value     = emp.department||'';
  document.getElementById('e-position').value = emp.position||'';
  document.getElementById('e-phone').value    = emp.phone||'';
  document.getElementById('e-role').value     = emp.role||'employee';
  document.getElementById('e-start').value    = emp.startDate||DB.today();
  document.getElementById('e-password').value = '';
  Modal.open('modal-emp');
}

function saveEmployee() {
  const name  = document.getElementById('e-name').value.trim();
  const email = document.getElementById('e-email').value.trim();
  const role  = document.getElementById('e-role').value;
  if (!name) return Toast.error('กรุณาใส่ชื่อ-นามสกุล');
  if (['admin','hr'].includes(role) && !email) return Toast.error('Admin/HR ต้องมีอีเมล');
  const data = { name, email, role, department: document.getElementById('e-dept').value.trim(), position: document.getElementById('e-position').value.trim(), phone: document.getElementById('e-phone').value.trim(), startDate: document.getElementById('e-start').value, password: document.getElementById('e-password').value||'orbit1234', companyId: user.companyId };
  if (editingId) { DB.Users.update(editingId, data); Toast.success('อัปเดตข้อมูลพนักงานแล้ว'); }
  else { DB.Users.create(data); Toast.success('เพิ่มพนักงานสำเร็จ'); }
  Modal.close('modal-emp');
  render();
}

function viewEmployee(id) {
  const emp = DB.Users.get(id);
  if (!emp) return;
  const company = Auth.currentCompany();
  const body = document.getElementById('detail-body');
  const footer = document.getElementById('detail-footer');
  const monthAtt = DB.Attendance.getByUser(id, { month: DB.today().slice(0,7) });
  const leaves   = DB.Leaves.getByUser(id).filter(l=>l.status==='approved');
  const balance  = DB.Leaves.getBalance(id);

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      ${renderAvatar(emp,'xl')}
      <div>
        <div style="font-size:20px;font-weight:700">${emp.name}</div>
        <div style="font-size:14px;color:var(--text-secondary);margin-top:2px">${emp.department||''} · ${emp.position||''}</div>
        <span class="badge ${emp.role==='admin'?'badge-primary':emp.role==='hr'?'badge-info':'badge-neutral'} mt-2">${roleLabel(emp.role)}</span>
      </div>
    </div>

    <div class="grid grid-2" style="margin-bottom:20px">
      ${emp.email?`<div style="padding:12px;background:var(--bg);border-radius:8px"><div style="font-size:11px;color:var(--text-muted)">อีเมล</div><div style="font-size:13px;font-weight:500;margin-top:2px">${emp.email}</div></div>`:''}
      ${emp.phone?`<div style="padding:12px;background:var(--bg);border-radius:8px"><div style="font-size:11px;color:var(--text-muted)">เบอร์โทร</div><div style="font-size:13px;font-weight:500;margin-top:2px">${emp.phone}</div></div>`:''}
      ${emp.startDate?`<div style="padding:12px;background:var(--bg);border-radius:8px"><div style="font-size:11px;color:var(--text-muted)">วันที่เริ่มงาน</div><div style="font-size:13px;font-weight:500;margin-top:2px">${formatDate(emp.startDate)}</div></div>`:''}
    </div>

    <!-- Login details -->
    <div style="padding:14px;background:var(--primary-light);border-radius:10px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--primary);margin-bottom:10px">ข้อมูลเข้าสู่ระบบ (แชร์ให้พนักงาน)</div>
      <div class="grid grid-2" style="gap:8px">
        <div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">รหัสบริษัท</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-family:monospace;font-size:15px;font-weight:700;letter-spacing:2px">${company?.code||'—'}</span>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="copyToClipboard('${company?.code||''}')" title="คัดลอก">${iconSVG('copy','13')}</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">รหัสพนักงาน</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-family:monospace;font-size:15px;font-weight:700;letter-spacing:2px">${emp.employeeCode||'Admin'}</span>
            ${emp.employeeCode?`<button class="btn btn-ghost btn-sm btn-icon" onclick="copyToClipboard('${emp.employeeCode}')">${iconSVG('copy','13')}</button>`:''}
          </div>
        </div>
      </div>
    </div>

    <!-- Stats this month -->
    <div class="grid grid-3" style="margin-bottom:16px">
      <div style="padding:12px;border:1px solid var(--border);border-radius:8px;text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--primary)">${monthAtt.length}</div>
        <div style="font-size:11px;color:var(--text-muted)">วันมาทำงานเดือนนี้</div>
      </div>
      <div style="padding:12px;border:1px solid var(--border);border-radius:8px;text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--warning)">${monthAtt.filter(a=>a.status==='late').length}</div>
        <div style="font-size:11px;color:var(--text-muted)">สายเดือนนี้</div>
      </div>
      <div style="padding:12px;border:1px solid var(--border);border-radius:8px;text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--accent)">${leaves.reduce((s,l)=>s+l.days,0)}</div>
        <div style="font-size:11px;color:var(--text-muted)">วันลาที่ใช้ปีนี้</div>
      </div>
    </div>
  `;
  footer.innerHTML = `
    <button class="btn btn-secondary" onclick="resetCode('${emp.id}')">${iconSVG('refresh','14')} รีเซ็ตรหัส</button>
    <button class="btn btn-secondary" onclick="Modal.close('modal-detail');editEmployee('${emp.id}')">${iconSVG('edit','14')} แก้ไข</button>
    <button class="btn btn-primary" onclick="Modal.close('modal-detail')">ปิด</button>
  `;
  Modal.open('modal-detail');
}

function resetCode(id) {
  confirmDialog('รีเซ็ตรหัสพนักงาน? รหัสเก่าจะใช้ไม่ได้', ()=>{
    const updated = DB.Users.resetCode(id);
    Toast.success(`รหัสใหม่: ${updated.employeeCode}`);
    Modal.close('modal-detail');
    render();
  }, false);
}

function removeEmployee(id) {
  const emp = DB.Users.get(id);
  confirmDialog(`ต้องการลบ "${emp?.name}" ออกจากระบบ?`, ()=>{
    DB.Users.softDelete(id);
    Toast.success('ลบพนักงานออกจากระบบแล้ว');
    render();
  });
}
</script>
</body>
</html>
